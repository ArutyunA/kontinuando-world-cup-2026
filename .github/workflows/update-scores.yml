name: Update Match Scores

on:
  schedule:
    # Every 15 minutes throughout the World Cup (Jun 11 – Jul 19 2026)
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch scores from football-data.org
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node .github/scripts/fetch-scores.js

      - name: Commit results.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          if git diff --staged --quiet; then
            echo "No score changes."
          else
            git commit -m "chore: update match scores $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
